<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Countdown</title>

  <!-- Schreibmaschinen-Font -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 1s ease;
      font-family: Arial, sans-serif;
    }

    /* Vor dem Wechsel */
    .before {
      background-color: black;
      color: white;
    }

    /* Nach dem Wechsel */
    .after {
      background-color: #6b7c8f;
      color: #0b2a4a;
    }

    #headline {
      font-family: 'Special Elite', monospace;
      font-size: 2em;
      border-right: 2px solid;
      white-space: nowrap;
      overflow: hidden;
    }

    #counter {
      font-size: 3em;
      margin-top: 20px;
    }
  </style>
</head>

<body class="before">

<h1 id="headline"></h1>
<div id="counter"></div>

<!-- Sound -->
<audio id="typeSound" src="https://www.soundjay.com/mechanical/typewriter-key-1.mp3" preload="auto"></audio>

<script>
  const targetDate = new Date("April 21, 2026 00:00:00").getTime();

  const textBefore = "Etwas passiert bald...";
  const textAfter = "Es ist soweit.";

  let charIndex = 0;
  let soundEnabled = false;

  const sound = document.getElementById("typeSound");

  // Sound erst nach Klick aktivieren
  document.body.addEventListener("click", () => {
    soundEnabled = true;
  }, { once: true });

  function typeWriter(text) {
    const el = document.getElementById("headline");
    el.innerText = "";
    charIndex = 0;

    function getRandomDelay(char) {
      let base = Math.random() * 70 + 40; // 40–110ms

      if (char === " ") base += 30;
      if ([".", "!", "?"].includes(char)) base += 180;

      return base;
    }

    function playSoundVariant() {
      if (!soundEnabled) return;

      const variation = Math.random() * 0.2 + 0.9;
      sound.playbackRate = variation;
      sound.volume = Math.random() * 0.3 + 0.7;

      sound.currentTime = 0;
      sound.play();
    }

    function type() {
      if (charIndex < text.length) {
        const char = text.charAt(charIndex);

        el.innerText += char;
        playSoundVariant();

        charIndex++;
        setTimeout(type, getRandomDelay(char));
      }
    }

    // kleine Startverzögerung
    setTimeout(type, 200 + Math.random() * 300);
  }

  // Initialer Text
  typeWriter(textBefore);

  const interval = setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance <= 0) {
      clearInterval(interval);

      document.body.classList.remove("before");
      document.body.classList.add("after");

      typeWriter(textAfter);
      document.getElementById("counter").innerText = "00:00:00";
      return;
    }

    const hours = Math.floor(distance / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("counter").innerText =
      `${hours}h ${minutes}m ${seconds}s`;
  }, 1000);
</script>

</body>
</html>
