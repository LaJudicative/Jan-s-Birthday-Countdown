<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Countdown</title>

  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
      transition: all 1s ease;
    }

    .before { background: black; color: white; }
    .after { background: #6b7c8f; color: #0b2a4a; }

    #headline {
      font-family: 'Special Elite', monospace;
      font-size: 2em;
      border-right: 2px solid;
      white-space: pre-wrap;
      z-index: 2;
      text-align: center;
      padding: 0 10px;
    }

    #counter {
      font-size: 3em;
      margin-top: 20px;
      z-index: 2;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* 🔧 BOOT SCREEN MOBILE FIX */
    #startOverlay {
      position: fixed;
      inset: 0;
      background: black;
      color: #00ff99;
      font-family: monospace;
      padding: 20px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    /* 📱 Mobile größer */
    @media (max-width: 600px) {
      #startOverlay {
        font-size: 16px;
        padding: 30px;
      }
    }

    .bootLine {
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>

<body class="before">

<div id="startOverlay"></div>

<h1 id="headline"></h1>
<div id="counter"></div>

<canvas id="confetti"></canvas>

<audio id="typeSound" src="typewriter.wav" preload="auto"></audio>

<script>
  const targetDate = new Date("April 21, 2026 00:00:00").getTime();

  const textBefore = `Und jedes Jahr wieder die Frage:
Wann hat der Jan denn Geburtstag?`;

  const textAfter = `Ich glaube, jetzt hat er.
Happy Birthday, Jan!`;

  let charIndex = 0;
  let soundEnabled = false;

  const sound = document.getElementById("typeSound");
  const overlay = document.getElementById("startOverlay");

  const preview = new URLSearchParams(window.location.search).get("preview");

  // -----------------------------
  // 🔊 AUDIO FIX (IMPORTANT)
  // -----------------------------
  function unlockAudio() {
    // Trick: einmal still abspielen → aktiviert Audio auf iOS/Android
    sound.volume = 0;
    sound.play().catch(() => {});
    sound.pause();
    sound.currentTime = 0;
    sound.volume = 1;
  }

  // -----------------------------
  // BOOT (MOBILE FRIENDLY)
  // -----------------------------
  const bootLines = [
    "Booting system...",
    "Loading module...",
    "Checking timeline...",
    "Ready."
  ];

  function buildBootScreen() {
    overlay.innerHTML = "";

    let delay = 0;

    bootLines.forEach(line => {
      const div = document.createElement("div");
      div.className = "bootLine";
      div.textContent = line;

      delay += 700 + Math.random() * 700;
      div.style.animationDelay = `${delay}ms`;

      overlay.appendChild(div);
    });

    const click = document.createElement("div");
    click.className = "bootLine";
    click.textContent = "👉 Tap to continue";
    click.style.color = "white";
    click.style.animationDelay = `${delay + 1000}ms`;

    overlay.appendChild(click);
  }

  buildBootScreen();

  // -----------------------------
  // START
  // -----------------------------
  overlay.addEventListener("click", () => {
    soundEnabled = true;
    unlockAudio(); // 🔊 FIX AUDIO DELAY
    overlay.style.display = "none";
    checkInitialState();
  }, { once: true });

  // -----------------------------
  // STATE
  // -----------------------------
  function startBeforeState() {
    document.body.classList.remove("after");
    document.body.classList.add("before");
    typeWriter(textBefore);
  }

  function startAfterState(skipTyping = false) {
    document.body.classList.remove("before");
    document.body.classList.add("after");

    document.getElementById("counter").textContent = "00:00:00";

    if (skipTyping) {
      document.getElementById("headline").textContent = textAfter;
    } else {
      typeWriter(textAfter);
    }

    startConfetti();
  }

  function checkInitialState() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (preview === "after") return startAfterState(true);
    if (preview === "before") return startBeforeState();
    if (distance <= 0) return startAfterState(true);

    startBeforeState();
  }

  // -----------------------------
  // TYPEWRITER (SLOW + RELIABLE SOUND)
  // -----------------------------
  function typeWriter(text) {
    const el = document.getElementById("headline");
    el.textContent = "";
    charIndex = 0;

    function getDelay(char) {
      let base = Math.random() * 140 + 90;

      if (char === " ") base += 50;
      if ([".", "!", "?"].includes(char)) base += 250;
      if (char === "\n") base += 300;

      return base;
    }

    function playSound() {
      if (!soundEnabled) return;

      sound.currentTime = 0;
      sound.volume = 1;
      sound.playbackRate = Math.random() * 0.15 + 0.92;
      sound.play().catch(() => {});
    }

    function type() {
      if (charIndex < text.length) {
        const char = text.charAt(charIndex);

        el.textContent += char;
        playSound();

        charIndex++;
        setTimeout(type, getDelay(char));
      }
    }

    setTimeout(type, 500);
  }

  // -----------------------------
  // COUNTDOWN
  // -----------------------------
  setInterval(() => {
    if (preview === "after") return;

    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance <= 0) {
      startAfterState(true);
      return;
    }

    if (preview === "before") return;

    const h = Math.floor(distance / 3600000);
    const m = Math.floor((distance % 3600000) / 60000);
    const s = Math.floor((distance % 60000) / 1000);

    document.getElementById("counter").textContent =
      `${h}h ${m}m ${s}s`;
  }, 1000);

  // -----------------------------
  // CONFETTI (unchanged)
  // -----------------------------
  function startConfetti() {
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    canvas.width = innerWidth;
    canvas.height = innerHeight;

    const parts = [];

    for (let i = 0; i < 120; i++) {
      parts.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        s: Math.random() * 6 + 3,
        v: Math.random() * 3 + 2,
        c: `hsl(${Math.random() * 360},70%,60%)`
      });
    }

    let f = 0;

    function anim() {
      ctx.clearRect(0,0,canvas.width,canvas.height);

      parts.forEach(p => {
        p.y += p.v;
        ctx.fillStyle = p.c;
        ctx.fillRect(p.x, p.y, p.s, p.s);

        if (p.y > canvas.height) p.y = -10;
      });

      if (f++ < 250) requestAnimationFrame(anim);
    }

    anim();
  }

</script>

</body>
</html>
